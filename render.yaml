# Render Blueprint: ONE service, everything bundled (see Dockerfile +
# deploy/start.sh + deploy/Caddyfile), on the FREE plan.
#
# Real tradeoff of the free plan: no persistent disk. Graph data lives on
# the container's own local (ephemeral) filesystem under /data -- fine
# while the service stays up, but a free service spins down after
# inactivity and loses that data on the next restart. If that happens,
# re-run the ingestion pipeline (or the dashboard's "submit a document"
# form) + approve each run again to repopulate `main` before anyone tests
# it. Not durable, but zero-cost and no external storage account needed --
# an explicit choice, not an oversight (see PRODUCTION_READINESS.md for
# the real fix: S3-compatible storage, same engine support either way).
#
# After first deploy, Render assigns this service's public URL
# (https://<name>-<hash>.onrender.com). Once you have it:
#   - set FRONTEND_ORIGIN below to your Netlify URL (needed for the
#     dashboard's cookie-based login to work cross-origin)
#   - the MCP endpoints for an external client (Claude Desktop/Code, or
#     the evaluator) are:
#       https://<this-service>.onrender.com/mcp/content-agent
#       https://<this-service>.onrender.com/mcp/gtm-agent
#   - the dashboard API (what the Netlify frontend calls) is:
#       https://<this-service>.onrender.com/api

services:
  - type: web
    name: analytos-context-layer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false # fill in: your Netlify URL, e.g. https://analytos.netlify.app
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none" # required: frontend (Netlify) and backend (Render) are different domains
      - key: SESSION_SECRET
        generateValue: true
      - key: MCP_ALLOWED_HOSTS
        sync: false # fill in: this service's own Render hostname, e.g. analytos.onrender.com
        # Required for the MCP endpoints specifically -- the MCP SDK's
        # DNS-rebinding protection rejects every Host header (421
        # Misdirected Request) unless explicitly allowlisted, and behind
        # Caddy the request's real Host header is this public hostname,
        # not 127.0.0.1.
