version: 1
metadata:
  name: analytos-context-layer

state:
  backend: cluster
  lock: true

# Local dev / this repo's own cluster/ directory: storage defaults to the
# config directory itself (unset). The HOSTED deployment overrides this at
# the container level -- see deploy/start.sh and render.yaml, which mount
# a persistent disk at /data and expect `storage: /data` here instead.
# Left unset here so `git clone` + local setup (README.md) keeps working
# exactly as documented without extra steps.

providers:
  embedding:
    default:
      # `mock` is deterministic and needs no API key, so the whole POC loop
      # (ingest -> review -> merge -> dashboard search -> agents) runs with
      # zero external dependencies. Swap `kind` to `openai-compatible` (or
      # `gemini`) + set OPENROUTER_API_KEY/GEMINI_API_KEY for real semantic
      # search quality.
      kind: mock

graphs:
  knowledge:
    schema: knowledge.pg
    embedding_provider: default
    queries: queries/

policies:
  base:
    file: base.policy.yaml
    applies_to: [knowledge]
  server:
    file: server.policy.yaml
    applies_to: [cluster]
