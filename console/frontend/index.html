<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GroundTruth Context Layer -- a governed, single-source-of-truth knowledge graph. Humans read it through this dashboard, agents read it through MCP, nothing lands without human review."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23659287'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif'%3EG%3C/text%3E%3C/svg%3E" />
    <title>GroundTruth Context Layer</title>
    <script>
      // Set the theme before first paint so there's no flash of the wrong
      // theme, and so an explicit in-app choice always wins over the OS
      // setting (see styles.css: :root[data-theme] beats the media query).
      // Defaults to "light" on a first visit rather than following the OS,
      // since the light palette is this app's primary showcased theme.
      (function () {
        var saved = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", saved === "dark" ? "dark" : "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
